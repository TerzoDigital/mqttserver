# set up persistence
persistence true
persistence_location /mosquitto/data/

# Disable anonymous access
allow_anonymous false

# Use password authentication
password_file /mosquitto/config/passwd_file

# Default listener (non-TLS) on port 1883
listener 1883

# TLS listener on port 8883
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key

# Require clients to present valid certs signed by our CA
#require_certificate true
#use_identity_as_username false # set true if you want CN from cert to act as username

# Optional: only allow TLS 1.2 or higher
tls_version tlsv1.2

# Logging
log_timestamp true
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
